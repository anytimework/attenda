<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f3; --card:#fff; --ink:#16232a; --muted:#5f6a6f; --faint:#98a3a8;
  --line:#dde4e8; --brand:#b0479b; --brandSoft:#f7e6f2; --blue:#0e90b3; --blueSoft:#e1f3f8;
  --good:#1a8a5a; --goodSoft:#e3f5ec; --warn:#b7791f; --warnSoft:#fdf3e0;
  --bad:#c0392b; --badSoft:#fbeae8; --r:12px; --sh:0 1px 3px rgba(16,35,45,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.mono{font-family:'DM Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:inherit}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--blue);outline-offset:1px}

/* ---------- login ---------- */
#login{min-height:100vh;display:grid;place-items:center;padding:20px}
.loginCard{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:32px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(16,35,45,.08)}
.logo{width:44px;height:44px;border-radius:11px;background:var(--brand);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:16px;margin-bottom:18px}
.loginCard h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.loginCard p.sub{font-size:13.5px;color:var(--muted);margin:5px 0 22px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field input{padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
.btn{padding:10px 16px;border-radius:9px;font-size:14px;font-weight:600;
  border:1px solid var(--line);background:var(--card);transition:.15s}
.btn:hover{background:var(--bg)}
.btn.pri{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.pri:hover{filter:brightness(1.08)}
.btn.pri:disabled{opacity:.55;cursor:not-allowed;filter:none}
.btn.full{width:100%;justify-content:center}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.good{color:var(--good);border-color:#bde5d1}
.btn.bad{color:var(--bad);border-color:#f0c7c1}
.msg{font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px;line-height:1.5}
.msg.err{background:var(--badSoft);color:var(--bad)}
.msg.ok{background:var(--goodSoft);color:var(--good)}

/* ---------- app ---------- */
#app{display:none;max-width:1180px;margin:0 auto;padding:18px 16px 60px}
header.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand .logo{width:34px;height:34px;font-size:13px;margin:0;border-radius:9px}
h1.title{font-size:18px;font-weight:700;letter-spacing:-.2px}
.orgline{font-size:12.5px;color:var(--muted)}
.spacer{flex:1}
.who{display:flex;align-items:center;gap:9px}
.av{width:32px;height:32px;border-radius:50%;background:var(--brandSoft);color:var(--brand);
  display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0}

nav.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:5px;box-shadow:var(--sh);overflow-x:auto;margin-bottom:16px}
nav.tabs button{padding:9px 15px;border-radius:8px;font-size:13.5px;font-weight:600;
  color:var(--muted);white-space:nowrap}
nav.tabs button:hover{background:var(--bg)}
nav.tabs button.on{background:var(--brandSoft);color:var(--brand)}

.grid{display:grid;gap:13px}
.cards{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;box-shadow:var(--sh)}
.k{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.v{font-size:25px;font-weight:700;letter-spacing:-.5px;margin-top:6px}
.vsub{font-size:12px;color:var(--muted);margin-top:3px}

.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden;margin-bottom:13px}
.phead{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;
  align-items:center;gap:10px;flex-wrap:wrap}
.phead h2{font-size:15px;font-weight:700}
.phead p{font-size:12.5px;color:var(--muted);width:100%;line-height:1.55}
.pbody{padding:16px}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--faint);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafcfd}
.tscroll{overflow-x:auto}
.name{font-weight:600}
.meta{font-size:12px;color:var(--muted)}
.rowflex{display:flex;align-items:center;gap:10px}

.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:999px;font-size:11.5px;font-weight:600}
.pill.good{background:var(--goodSoft);color:var(--good)}
.pill.warn{background:var(--warnSoft);color:var(--warn)}
.pill.bad{background:var(--badSoft);color:var(--bad)}
.pill.blue{background:var(--blueSoft);color:var(--blue)}
.pill.grey{background:var(--bg);color:var(--muted)}

.empty{text-align:center;color:var(--faint);padding:32px 16px;line-height:1.6}
.empty b{display:block;color:var(--muted);font-size:14px;margin-bottom:4px;font-weight:600}
.skel{padding:32px;text-align:center;color:var(--faint);font-size:13.5px}

.clockbar{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;box-shadow:var(--sh);margin-bottom:13px;display:flex;
  align-items:center;gap:14px;flex-wrap:wrap}
.clockbar .info{flex:1;min-width:180px}
.clockbar .st{font-size:15px;font-weight:700}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;
  font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:.28s;z-index:99;opacity:0;
  max-width:90vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--bad)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
.modalbg{position:fixed;inset:0;background:rgba(16,35,45,.45);display:none;
  place-items:center;z-index:80;padding:18px;overflow-y:auto}
.modalbg.on{display:grid}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:480px;
  box-shadow:0 12px 40px rgba(0,0,0,.22);max-height:90vh;display:flex;flex-direction:column}
.modal h3{font-size:16px;font-weight:700;padding:17px 18px 0}
.modal .mbody{padding:16px 18px;overflow-y:auto}
.modal .mfoot{padding:13px 18px;border-top:1px solid var(--line);
  display:flex;gap:9px;justify-content:flex-end;flex-wrap:wrap}
.modal .mfoot .spacer{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:19px;height:19px;padding:0 5px;border-radius:99px;background:var(--bad);
  color:#fff;font-size:11px;font-weight:700;margin-left:6px;vertical-align:middle}
nav.tabs button.on .badge{background:var(--brand)}
.appcard{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:15px 16px;margin-bottom:11px;box-shadow:var(--sh)}
.approw{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.wdate{font-size:14px;font-weight:600;color:var(--muted);margin:2px 0 12px}
.wcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:17px;box-shadow:var(--sh);margin-bottom:12px}
.wrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.wtime{font-size:20px;font-weight:700;letter-spacing:-.3px}
.wmeta{font-size:13px;color:var(--muted);margin-top:3px}
.whrs{font-size:17px;font-weight:700;color:var(--brand)}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.wbox{background:var(--bg);border-radius:10px;padding:11px 13px}
.wlab{font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
.wval{font-size:16px;font-weight:600;margin-top:3px;font-family:'DM Mono',monospace}
.brkrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.brk{padding:12px 4px;border:1px solid var(--line);border-radius:10px;background:var(--card);
  font-size:14px;font-weight:600;color:var(--muted)}
.brk.on{background:var(--brandSoft);border-color:var(--brand);color:var(--brand)}
.wbtn{width:100%;padding:15px;border-radius:12px;font-size:16px;font-weight:700;
  margin-top:14px;color:#fff;background:var(--good)}
.wbtn.out{background:var(--bad)}
.wbtn.pri{background:var(--brand);margin-top:0}
.wh3{font-size:15.5px;font-weight:700;margin:4px 0 11px}
.ucard{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:13px 15px;margin-bottom:9px;display:flex;gap:15px;align-items:center}
.udate{text-align:center;min-width:44px;border-right:1px solid var(--line);padding-right:14px}
.udow{font-size:10.5px;font-weight:700;color:var(--brand);letter-spacing:.5px}
.udd{font-size:21px;font-weight:700;line-height:1.1}
.umon{font-size:10.5px;color:var(--faint);font-weight:600}
.inout{font-size:12.5px;background:var(--bg);border-radius:8px;padding:6px 10px;
  font-family:'DM Mono',monospace}
.balgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:420px){.balgrid{grid-template-columns:1fr}}
.balcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px}
.ltype{font-size:13.5px;font-weight:600}
.lbig{font-size:27px;font-weight:700;margin-top:5px;letter-spacing:-.5px}
.lsm{font-size:14px;font-weight:500;color:var(--faint)}
.lused{font-size:12px;color:var(--muted);margin-top:2px}
.secthead{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;
  letter-spacing:.6px;margin:16px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.secthead:first-child{margin-top:0}
.switchrow{display:flex;align-items:center;gap:9px;margin-top:10px;cursor:pointer;font-size:13.5px}
.switchrow input{width:17px;height:17px;accent-color:var(--brand);cursor:pointer}
.dowrow{display:flex;gap:5px;flex-wrap:wrap}
.dow{padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card);
  font-size:12.5px;font-weight:600;color:var(--muted);min-width:46px}
.dow.on{background:var(--brandSoft);border-color:var(--brand);color:var(--brand)}
.field textarea{width:100%}
.codebox{background:var(--brandSoft);border:1px dashed var(--brand);border-radius:10px;
  padding:16px;text-align:center;margin:10px 0}
.codebox .c{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;
  letter-spacing:2px;color:var(--brand);user-select:all}
.linkbtn{background:none;border:none;color:var(--blue);font-size:12.5px;
  font-weight:600;cursor:pointer;padding:2px 4px}
.linkbtn:hover{text-decoration:underline}
.linkbtn.danger{color:var(--bad)}
.foot{font-size:11.5px;color:var(--faint);line-height:1.6;margin-top:14px;
  padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="loginCard">
    <div class="logo">A</div>
    <h1>Attenda</h1>
    <p class="sub">Sign in to see your roster, clock in, and manage leave.</p>
    <div id="loginMsg"></div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@company.com">
    </div>
    <div class="field">
      <label for="pw">Password</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn pri full" id="signInBtn">Sign in</button>
    <p class="sub" style="margin:16px 0 0;text-align:center;font-size:12.5px">
      Got an invite code? <button class="linkbtn" id="toSignup">Join your team</button></p>
    <div style="border-top:1px solid var(--line);margin:16px 0 0;padding-top:14px">
      <p class="sub" style="margin:0;text-align:center;font-size:12.5px">
        New here? <button class="linkbtn" id="toOrg">Set up your company</button></p>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header class="top">
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <h1 class="title">Attenda</h1>
        <div class="orgline" id="orgline">—</div>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="who">
      <div class="av" id="meAv">–</div>
      <div>
        <div class="name" id="meName" style="font-size:13.5px">—</div>
        <div class="meta" id="meRole">—</div>
      </div>
      <button class="btn sm" id="signOutBtn" style="margin-left:6px">Sign out</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <section id="view"><div class="skel">Loading…</div></section>

  <div class="foot">
    Contribution rates are templates for convenience and are not legal or tax advice.
    Confirm current figures with your local authority before running payroll.
  </div>
</div>

<div class="modalbg" id="modalbg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ============================================================
   CONFIG — replace with your own project's values.
   The anon key is safe in browser code: row-level security in
   the database is what protects the data, not this key.
   Never put the service_role key here.
   ============================================================ */
const SUPABASE_URL  = 'https://gdfxysfcramcqajccxlq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkZnh5c2ZjcmFtY3FhamNjeGxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3OTI4MjYsImV4cCI6MjEwMDM2ODgyNn0.R86dkqEXYKy2mPOGl6wmcdisCIX3IZSEnnGa4C4BFIc';

const db = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth:{ persistSession:true, autoRefreshToken:true, storageKey:'attenda.auth' }
});

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = n => (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const CUR = {SGD:'S$',USD:'$',GBP:'£',EUR:'€',AUD:'A$',CAD:'C$',INR:'₹',AED:'AED ',ZAR:'R',MYR:'RM',PHP:'₱'};
const sym = () => CUR[S.org?.currency_code] || (S.org?.currency_code ? S.org.currency_code+' ' : '$');
const money = n => sym() + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const hhmm = ts => ts ? new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
const dmy  = d  => d ? new Date(d).toLocaleDateString([], {day:'2-digit',month:'short'}) : '—';

function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast on' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.className='toast', 2800);
}

/* ---------------- state ---------------- */
const S = { user:null, org:null, role:null, me:null, tab:'today',
            shifts:[], members:[], leave:[], contributions:[], locations:[],
            leaveTypes:[], overrides:[], openEntry:null, balances:[],
            timesheets:[], stats:null, breakChoice:null, pending:null };

/* ---------------- auth ---------------- */
$('#signInBtn').onclick = signIn;
$('#toSignup').onclick = showSignup;
$('#toOrg').onclick = showOrgSignup;
$('#pw').onkeydown = e => { if(e.key==='Enter') signIn(); };
$('#email').onkeydown = e => { if(e.key==='Enter') $('#pw').focus(); };

async function signIn(){
  const btn = $('#signInBtn'), box = $('#loginMsg');
  const email = $('#email').value.trim(), password = $('#pw').value;
  if(!email || !password){ box.innerHTML = '<div class="msg err">Enter your email and password.</div>'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; box.innerHTML = '';
  const { error } = await db.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Sign in';
  if(error){
    box.innerHTML = `<div class="msg err">${esc(error.message)}</div>`;
    return;
  }
  boot();
}

$('#signOutBtn').onclick = async () => {
  await db.auth.signOut();
  location.reload();
};


/* ---------------- account creation via invite code ---------------- */
function showSignup(){
  $('#login').innerHTML = `<div class="loginCard">
    <div class="logo">A</div>
    <h1>Create your account</h1>
    <p class="sub">Enter the invite code your manager sent you, then choose a password.</p>
    <div id="suMsg"></div>
    <div class="field"><label for="su_code">Invite code</label>
      <input id="su_code" type="text" placeholder="ABCD-1234" autocapitalize="characters" spellcheck="false"></div>
    <div class="field"><label for="su_email">Email</label>
      <input id="su_email" type="email" autocomplete="username" placeholder="you@example.com"></div>
    <div class="field"><label for="su_pw">Choose a password</label>
      <input id="su_pw" type="password" autocomplete="new-password" placeholder="At least 8 characters"></div>
    <button class="btn pri full" id="su_go">Create account</button>
    <p class="sub" style="margin:16px 0 0;text-align:center;font-size:12.5px">
      Already have an account? <button class="linkbtn" id="toSignin">Sign in</button><br>
      Setting up a new company? <button class="linkbtn" id="toOrg2">Start here</button></p>
  </div>`;
  $('#toSignin').onclick = () => location.reload();
  $('#toOrg2').onclick = showOrgSignup;
  $('#su_go').onclick = doSignup;
  $('#su_pw').onkeydown = e => { if(e.key==='Enter') doSignup(); };
}

async function doSignup(){
  const box=$('#suMsg'), btn=$('#su_go');
  const code=$('#su_code').value.trim(), email=$('#su_email').value.trim(), pw=$('#su_pw').value;
  const err = m => { box.innerHTML = `<div class="msg err">${esc(m)}</div>`; };
  box.innerHTML='';
  if(!code){ err('Enter your invite code.'); return; }
  if(!email){ err('Enter your email.'); return; }
  if(pw.length < 8){ err('Password must be at least 8 characters.'); return; }

  btn.disabled=true; btn.textContent='Creating account…';
  // 1. create the auth user
  const { error: suErr } = await db.auth.signUp({ email, password: pw });
  if(suErr){
    // an existing account is fine — sign in and redeem against it
    const { error: siErr } = await db.auth.signInWithPassword({ email, password: pw });
    if(siErr){ btn.disabled=false; btn.textContent='Create account'; err(suErr.message); return; }
  }
  // 2. make sure we have a session (email confirmation may be on)
  const { data:{ session } } = await db.auth.getSession();
  if(!session){
    btn.disabled=false; btn.textContent='Create account';
    err('Account created. Please confirm your email, then sign in and enter your code.');
    return;
  }
  // 3. redeem the invite
  const { data, error } = await db.rpc('dh_redeem_invite', { p_code: code });
  if(error){
    btn.disabled=false; btn.textContent='Create account';
    err(error.message); return;
  }
  const info = Array.isArray(data) ? data[0] : data;
  toast(`Welcome${info?.member_name ? ', '+info.member_name.split(' ')[0] : ''}`);
  boot();
}


/* ---------------- new organisation signup ---------------- */
const COUNTRIES = [
  ['SG','Singapore','SGD','Asia/Singapore'],
  ['GB','United Kingdom','GBP','Europe/London'],
  ['US','United States','USD','America/New_York'],
  ['AU','Australia','AUD','Australia/Sydney'],
  ['CA','Canada','CAD','America/Toronto'],
  ['IN','India','INR','Asia/Kolkata'],
  ['MY','Malaysia','MYR','Asia/Kuala_Lumpur'],
  ['PH','Philippines','PHP','Asia/Manila'],
  ['ID','Indonesia','IDR','Asia/Jakarta'],
  ['AE','United Arab Emirates','AED','Asia/Dubai'],
  ['ZA','South Africa','ZAR','Africa/Johannesburg'],
  ['NZ','New Zealand','NZD','Pacific/Auckland'],
  ['IE','Ireland','EUR','Europe/Dublin'],
  ['DE','Germany','EUR','Europe/Berlin'],
  ['FR','France','EUR','Europe/Paris'],

async function doOrgSignup(){
  const box=$('#ogMsg'), btn=$('#og_go');
  const err = m => { box.innerHTML = `<div class="msg err">${esc(m)}</div>`;
                     btn.disabled=false; btn.textContent='Create company account'; };
  box.innerHTML='';
  const org=$('#og_org').value.trim(), you=$('#og_you').value.trim();
  const email=$('#og_email').value.trim(), pw=$('#og_pw').value;
  const cc=$('#og_country').value, cur=$('#og_cur').value.trim().toUpperCase();
  const hours=parseFloat($('#og_hours').value)||38;

  if(!org){ err('Enter your company name.'); return; }
  if(!you){ err('Enter your name.'); return; }
  if(!email){ err('Enter your email.'); return; }
  if(pw.length<8){ err('Password must be at least 8 characters.'); return; }
  if(cur.length!==3){ err('Currency should be a 3-letter code, like SGD.'); return; }

  btn.disabled=true; btn.textContent='Creating…';

  const { error: suErr } = await db.auth.signUp({ email, password: pw });
  if(suErr){
    const { error: siErr } = await db.auth.signInWithPassword({ email, password: pw });
    if(siErr){ err(suErr.message); return; }
  }
  const { data:{ session } } = await db.auth.getSession();
  if(!session){
    err('Account created. Please confirm your email, then sign in to finish setting up.');
    return;
  }

  const tz = COUNTRIES.find(x=>x[0]===cc)?.[3]
    || Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
  const { error } = await db.rpc('dh_create_org', {
    p_name: org, p_country: cc || 'US', p_currency: cur,
    p_timezone: tz, p_owner_name: you, p_hours: hours
  });
  if(error){ err(error.message); return; }
  toast('Welcome to Attenda');
  boot();
}

const isMgr = () => ['owner','admin','manager'].includes(S.role);

function buildTabs(){
  const tabs = isMgr()
    ? [['today','Today'],['approvals','Approvals'],['team','Team'],['shifts','Shifts'],
       ['timesheets','Timesheets'],['leave','Leave'],['costs','Costs'],['setup','Setup']]
    : wTabs();

  $('#tabs').innerHTML = tabs.map(([k,l])=>{

    return `<button data-t="${k}">${l}${n?`<span class="badge">${n}</span>`:''}</button>`;

/* ---------------- data ---------------- */
async function refresh(){
  const org = S.org.id;
  const today = new Date().toISOString().slice(0,10);
  const from  = new Date(Date.now()-14*864e5).toISOString().slice(0,10);
  const to    = new Date(Date.now()+14*864e5).toISOString().slice(0,10);

  const q = [
    db.from('dh_shifts')
      .select('*, dh_members(full_name,job_title), dh_locations(name)')
      .eq('org_id',org).gte('shift_date',from).lte('shift_date',to)
      .order('shift_date').order('starts_at'),
    db.from('dh_leave_requests')
      .select('*, dh_members(full_name), dh_leave_types(name,is_paid)')
      .eq('org_id',org).order('starts_on'),
    db.from('dh_time_entries')
      .select('*').eq('org_id',org).is('clock_out_at',null)
  ];
  if(!isMgr()) q.push(db.from('dh_leave_types').select('*').eq('org_id',org).order('name'));
  if(isMgr()){
    q.push(db.from('dh_members').select('*, dh_locations(name)').eq('org_id',org).order('full_name'));
    q.push(db.from('dh_contributions').select('*').eq('org_id',org).order('sort_order'));
    q.push(db.from('dh_locations').select('*').eq('org_id',org).order('name'));
    q.push(db.from('dh_leave_types').select('*').eq('org_id',org).order('name'));
    q.push(db.from('dh_member_leave_overrides').select('*'));
  }

  const res = await Promise.all(q);
  const bad = res.find(r=>r.error);
  if(bad){ $('#view').innerHTML = errBox(bad.error.message); return; }

  S.shifts = res[0].data || [];
  S.leave  = res[1].data || [];
  const open = res[2].data || [];
  S.openEntry = S.me ? open.find(e=>e.member_id===S.me.id) || null : null;
  if(!isMgr()) S.leaveTypes = res[3]?.data || [];
  S.members  = isMgr() ? (res[3].data || []) : [];
  S.contributions = isMgr() ? (res[4].data || []) : [];
  S.locations = isMgr() ? (res[5].data || []) : [];
  S.leaveTypes = isMgr() ? (res[6].data || []) : [];
  S.overrides  = isMgr() ? (res[7].data || []) : [];

  if(isMgr()){
    const { data:pc } = await db.rpc('dh_pending_counts');
    S.pending = Array.isArray(pc) ? pc[0] : pc;
    buildTabs();
  }
  if(S.me){
    const { data:bal } = await db.from('dh_leave_balances')
      .select('*').eq('member_id', S.me.id);
    S.balances = bal || [];
    if(!isMgr()){
      const { data:ts } = await db.from('dh_timesheet_rows')
        .select('*').eq('member_id', S.me.id)
        .not('clock_out_at','is',null)
        .order('clock_in_at', { ascending:false }).limit(30);
      S.timesheets = ts || [];
      const { data:st } = await db.rpc('dh_my_stats');
      S.stats = Array.isArray(st) ? st[0] : st;
    }
  }
  render();
}

/* ---------------- clock in / out ---------------- */
function position(){
  return new Promise(res=>{
    if(!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p => res({lat:p.coords.latitude, lng:p.coords.longitude}),
      () => res(null),
      { enableHighAccuracy:true, timeout:8000 }
    );
  });
}

async function clockIn(shiftId){
  if(!S.me){ toast('Your login isn\u2019t linked to a member record.', true); return; }
  toast('Checking your location…');
  const p = await position();
  const { error } = await db.rpc('dh_clock_in', {
    p_member:S.me.id, p_shift:shiftId,
    p_lat:p?.lat ?? null, p_lng:p?.lng ?? null
  });
  if(error){ toast(error.message, true); return; }
  toast('Clocked in');
  refresh();
}

async function clockOut(breakMins){
  const p = await position();
  const { error } = await db.rpc('dh_clock_out', {
    p_member:S.me.id, p_lat:p?.lat ?? null, p_lng:p?.lng ?? null,
    p_break: breakMins ?? 0
  });
  if(error){ toast(error.message, true); return; }
  toast('Clocked out');
  S.breakChoice = null;
  refresh();
}

async function cancelLeave(id){
  const { error } = await db.rpc('dh_cancel_leave', { p_request: id });
  if(error){ toast(error.message, true); return; }
  toast('Request cancelled'); refresh();
}

async function decideLeave(id, approve){
  const { error } = await db.rpc('dh_decide_leave', { p_request:id, p_approve:approve });
  if(error){ toast(error.message, true); return; }
  toast(approve ? 'Leave approved' : 'Leave declined');
  refresh();
}

const fld = (id,label,val,type,extra) =>

  `<div class="field"><label for="${id}">${esc(label)}</label><select id="${id}">
   ${opts.map(([v,l])=>`<option value="${esc(v)}"${String(v)===String(val)?' selected':''}>${esc(l)}</option>`).join('')}

}

/* ---------------- recurring weekly pattern ---------------- */
const DOW = [[1,'Mon'],[2,'Tue'],[3,'Wed'],[4,'Thu'],[5,'Fri'],[6,'Sat'],[7,'Sun']];

async function scheduleForm(m){
  const { data:existing } = await db.from('dh_fixed_schedules')
    .select('*').eq('member_id', m.id).eq('is_active', true).maybeSingle();
  const days = existing?.days || [1,2,3,4,5];
  const locs = [['','— none —'], ...S.locations.map(l=>[l.id,l.name])];

  modal('Weekly pattern — '+m.full_name, `
    <p class="hint" style="margin:0 0 12px">Set the days and times this person normally works,
      then generate real shifts from it. Dates that already have a shift are skipped.</p>
    <div class="field"><label>Days</label>
      <div class="dowrow">${DOW.map(([n,l])=>`
        <button type="button" class="dow${days.includes(n)?' on':''}" data-dow="${n}">${l}</button>`).join('')}</div>
    </div>
    <div class="grid2">
      ${fld('sc_start','Starts', existing?.start_time?.slice(0,5) || '09:00', 'time')}
      ${fld('sc_end','Ends', existing?.end_time?.slice(0,5) || '17:00', 'time')}
    </div>
    <div class="grid2">
      ${fld('sc_break','Unpaid break (mins)', existing?.break_mins ?? 0, 'number', 'min="0"')}
      ${sel('sc_loc','Location', existing?.location_id || m.primary_location_id || '', locs)}
    </div>
    <div class="grid2">
      ${fld('sc_from','Pattern starts', existing?.starts_on || new Date().toISOString().slice(0,10), 'date')}
      ${fld('sc_until','Pattern ends', existing?.ends_on || '', 'date', 'placeholder="optional"')}
    </div>
    <div class="secthead">Generate shifts</div>
    <div class="grid2">
      ${fld('g_from','From', new Date().toISOString().slice(0,10), 'date')}
      ${fld('g_to','To', new Date(Date.now()+27*864e5).toISOString().slice(0,10), 'date')}
    </div>`,
    `${existing ? `<button class="btn bad" id="sc_del">Remove pattern</button>` : ''}
     <div class="spacer"></div>
     <button class="btn" data-close="1">Cancel</button>
     <button class="btn" id="sc_save">Save pattern</button>
     <button class="btn pri" id="sc_gen">Save &amp; generate</button>`);

  const picked = new Set(days);
  $('#modal').querySelectorAll('[data-dow]').forEach(b=>{
    b.onclick = () => { const n=+b.dataset.dow;
      if(picked.has(n)) picked.delete(n); else picked.add(n);
      b.classList.toggle('on'); };
  });

  const savePattern = async () => {
    if(!picked.size){ toast('Pick at least one day', true); return null; }
    const row = {
      org_id:S.org.id, member_id:m.id, location_id:V('sc_loc')||null,
      days:[...picked].sort(), start_time:V('sc_start'), end_time:V('sc_end'),
      break_mins:parseInt(V('sc_break'))||0,
      starts_on:V('sc_from'), ends_on:V('sc_until')||null, is_active:true
    };
    const q = existing
      ? db.from('dh_fixed_schedules').update(row).eq('id',existing.id)
      : db.from('dh_fixed_schedules').insert(row);
    const { error } = await q;
    if(error){ toast(error.message, true); return null; }
    return true;
  };

  $('#sc_save').onclick = async () => {
    if(await savePattern()){ toast('Pattern saved'); closeModal(); refresh(); }
  };
  $('#sc_gen').onclick = async () => {
    if(!await savePattern()) return;
    const { data, error } = await db.rpc('dh_generate_shifts', {
      p_member:m.id, p_from:V('g_from'), p_to:V('g_to')
    });
    if(error){ toast(error.message, true); return; }
    toast(data ? `${data} shift${data===1?'':'s'} created` : 'No new shifts — already scheduled');
    closeModal(); refresh();
  };
  if(existing) $('#sc_del').onclick = async () =>
    run(db.from('dh_fixed_schedules').delete().eq('id',existing.id), 'Pattern removed');
}

    `<div class="spacer"></div>
     <button class="btn" id="i_copy">Copy message</button>
     <button class="btn pri" data-close="1">Done</button>`);
  $('#i_copy').onclick = () => {

  const today = new Date().toISOString().slice(0,10);
  modal('Schedule shift', `
    ${sel('s_mem','Member','',mem.map(m=>[m.id,m.full_name]))}
    ${sel('s_loc','Location','',[['','— none —'],...S.locations.map(l=>[l.id,l.name])])}
    ${fld('s_date','Date', today, 'date')}
    <div class="grid2">
      ${fld('s_start','Starts', '09:00', 'time')}
      ${fld('s_end','Ends', '17:00', 'time')}
    </div>
    ${fld('s_break','Unpaid break (minutes)', 0, 'number', 'min="0"')}
    <p class="hint">Times are in ${esc(S.org.timezone||'your local timezone')}.</p>`,
    `<div class="spacer"></div>
     <button class="btn" data-close="1">Cancel</button>
     <button class="btn pri" id="s_save">Schedule</button>`);

  $('#s_save').onclick = async () => {
    const d=V('s_date'), st=V('s_start'), en=V('s_end');
    if(!d||!st||!en){ toast('Date and times are required', true); return; }
    const starts = new Date(`${d}T${st}`);
    let ends = new Date(`${d}T${en}`);
    if(ends <= starts) ends = new Date(ends.getTime()+864e5); // overnight shift
    await run(db.from('dh_shifts').insert({
      org_id:S.org.id, member_id:V('s_mem'), location_id:V('s_loc')||null,
      shift_date:d, starts_at:starts.toISOString(), ends_at:ends.toISOString(),
      break_minutes: parseInt(V('s_break'))||0, status:'scheduled'
    }), 'Shift scheduled');
  };
}

/* ---------------- views ---------------- */
const shiftPill = s => s.status==='in_progress' ? '<span class="pill good">On shift</span>'
  : s.status==='completed' ? '<span class="pill blue">Completed</span>'
  : s.status==='cancelled' ? '<span class="pill grey">Cancelled</span>'
  : s.status==='missed'    ? '<span class="pill bad">Missed</span>'
  : '<span class="pill grey">Scheduled</span>';

function vToday(){
  const today = new Date().toISOString().slice(0,10);
  const mine  = S.me ? S.shifts.filter(s=>s.member_id===S.me.id) : [];
  const next  = mine.find(s=>s.shift_date>=today && s.status!=='completed');
  const onNow = S.shifts.filter(s=>s.status==='in_progress').length;
  const pend  = S.leave.filter(l=>l.status==='pending').length;
  const todays= S.shifts.filter(s=>s.shift_date===today);

  let clock = '';
  if(S.me){
    if(S.openEntry){
      clock = `<div class="clockbar">
        <div class="av" style="width:38px;height:38px">${initials(S.me.full_name)}</div>
        <div class="info"><div class="st" style="color:var(--good)">On shift</div>
          <div class="meta">Clocked in at ${hhmm(S.openEntry.clock_in_at)}</div></div>
        <button class="btn pri" id="coBtn">Clock out</button></div>`;
    } else if(next){
      clock = `<div class="clockbar">
        <div class="av" style="width:38px;height:38px">${initials(S.me.full_name)}</div>
        <div class="info"><div class="st">Next shift</div>
          <div class="meta">${dmy(next.shift_date)} · ${hhmm(next.starts_at)}–${hhmm(next.ends_at)}
          ${next.dh_locations?.name ? ' · '+esc(next.dh_locations.name) : ''}</div></div>
        <button class="btn pri" data-ci="${next.id}">Clock in</button></div>`;
    } else {
      clock = `<div class="clockbar"><div class="info">
        <div class="st">No upcoming shifts</div>
        <div class="meta">New shifts appear here once they're scheduled.</div></div></div>`;
    }
  }

  const cards = isMgr() ? `<div class="grid cards" style="margin-bottom:13px">
    <div class="card"><div class="k">On shift now</div><div class="v" style="color:${onNow?'var(--good)':'inherit'}">${onNow}</div><div class="vsub">of ${S.members.length} members</div></div>
    <div class="card"><div class="k">Shifts today</div><div class="v">${todays.length}</div><div class="vsub">scheduled</div></div>
    <div class="card"><div class="k">Leave to review</div><div class="v" style="color:${pend?'var(--warn)':'inherit'}">${pend}</div><div class="vsub">${pend?'awaiting decision':'all caught up'}</div></div>
  </div>` : '';

  const bal = S.balances.length ? `<div class="panel"><div class="phead"><h2>Your leave balance</h2></div>
    <div class="tscroll"><table><thead><tr><th>Type</th><th>Allowed</th><th>Taken</th><th>Remaining</th></tr></thead><tbody>
    ${S.balances.map(b=>`<tr><td class="name">${esc(b.leave_type)}</td>
      <td class="mono">${b.days_allowed}</td><td class="mono">${b.days_taken}</td>
      <td class="mono"><b>${b.days_remaining}</b></td></tr>`).join('')}
    </tbody></table></div></div>` : '';

  const list = todays.length ? `<div class="panel"><div class="phead"><h2>Today's shifts</h2></div>
    <div class="tscroll"><table><thead><tr><th>Member</th><th>Time</th><th>Location</th><th>Status</th></tr></thead><tbody>
    ${todays.map(s=>`<tr>
      <td><div class="rowflex"><div class="av">${initials(s.dh_members?.full_name)}</div>
        <div><div class="name">${esc(s.dh_members?.full_name)}</div>
        <div class="meta">${esc(s.dh_members?.job_title||'')}</div></div></div></td>
      <td class="mono">${hhmm(s.starts_at)}–${hhmm(s.ends_at)}</td>
      <td>${esc(s.dh_locations?.name||'—')}</td><td>${shiftPill(s)}</td></tr>`).join('')}
    </tbody></table></div></div>`
    : `<div class="panel"><div class="empty"><b>Nothing scheduled today</b>Shifts you add will show up here.</div></div>`;

  return clock + cards + bal + list;
}

    <td>${esc((m.employment_type||'').replace('_',' '))}${m.ot_eligible?' <span class="pill blue" style="margin-left:4px">OT</span>':''}</td>
    <td class="mono">${m.monthly_salary ? money(m.monthly_salary)+'<span class="meta"> /mo</span>'
      : money(m.pay_rate)+`<span class="meta">${m.pay_basis==='hourly'?' /hr':m.pay_basis==='annual'?' /yr':' /mo'}</span>`}</td>
    <td>${esc(m.dh_locations?.name||'—')}</td>
    <td>${m.status==='active'?'<span class="pill good">Active</span>'
      :m.status==='invited'?'<span class="pill warn">Invited</span>'
      :`<span class="pill grey">${esc(m.status)}</span>`}</td>
    <td style="white-space:nowrap">
      <button class="linkbtn" data-editmem="${m.id}">Edit</button>
      ${!m.user_id && m.status!=='offboarded' ? `<button class="linkbtn" data-invite="${m.id}">Invite</button>` : ''}
    </td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function vTimesheets(){
  const done = S.shifts.filter(s=>s.status==='completed');
  if(!done.length) return `<div class="panel"><div class="empty">
    <b>No completed shifts yet</b>Timesheets fill in as people clock in and out.</div></div>`;
  return `<div class="panel"><div class="phead"><h2>Timesheets</h2>
    <p>Completed shifts in the current window.</p></div>
  <div class="tscroll"><table><thead><tr><th>Date</th><th>Member</th><th>Scheduled</th><th>Location</th></tr></thead><tbody>
  ${done.map(s=>`<tr><td class="mono">${dmy(s.shift_date)}</td>
    <td><div class="rowflex"><div class="av">${initials(s.dh_members?.full_name)}</div>
      <div class="name">${esc(s.dh_members?.full_name)}</div></div></td>
    <td class="mono">${hhmm(s.starts_at)}–${hhmm(s.ends_at)}</td>
    <td>${esc(s.dh_locations?.name||'—')}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}

function vLeave(){
  const rows = isMgr() ? S.leave : S.leave.filter(l=>S.me && l.member_id===S.me.id);
  const bal = S.balances.length && !isMgr() ? `<div class="panel"><div class="phead"><h2>Your balance</h2></div>
    <div class="tscroll"><table><thead><tr><th>Type</th><th>Allowed</th><th>Taken</th><th>Remaining</th></tr></thead><tbody>
    ${S.balances.map(b=>`<tr><td class="name">${esc(b.leave_type)}</td><td class="mono">${b.days_allowed}</td>
      <td class="mono">${b.days_taken}</td><td class="mono"><b>${b.days_remaining}</b></td></tr>`).join('')}
    </tbody></table></div></div>` : '';

  if(!rows.length) return bal + `<div class="panel"><div class="empty">
    <b>No leave requests</b>${isMgr()?'Requests appear here for approval.':'Your requests will show up here.'}</div></div>`;

  return bal + `<div class="panel"><div class="phead"><h2>${isMgr()?'Leave requests':'My leave'}</h2></div>
  <div class="tscroll"><table><thead><tr>${isMgr()?'<th>Member</th>':''}<th>Type</th><th>Dates</th><th>Days</th><th>Status</th>${isMgr()?'<th></th>':''}</tr></thead><tbody>
  ${rows.map(l=>`<tr>
    ${isMgr()?`<td><div class="rowflex"><div class="av">${initials(l.dh_members?.full_name)}</div>
      <div class="name">${esc(l.dh_members?.full_name)}</div></div></td>`:''}
    <td>${esc(l.dh_leave_types?.name||'')}${l.dh_leave_types && !l.dh_leave_types.is_paid?' <span class="meta">(unpaid)</span>':''}</td>
    <td class="mono">${dmy(l.starts_on)}${l.days_count>1?' → '+dmy(l.ends_on):''}</td>
    <td class="mono">${l.days_count}</td>
    <td>${l.status==='approved'?'<span class="pill good">Approved</span>'
      :l.status==='declined'?'<span class="pill bad">Declined</span>'
      :l.status==='cancelled'?'<span class="pill grey">Cancelled</span>'
      :'<span class="pill warn">Pending</span>'}</td>
    ${isMgr()?`<td>${l.status==='pending'?`<div class="rowflex">
      <button class="btn sm good" data-ap="${l.id}">Approve</button>
      <button class="btn sm bad" data-dc="${l.id}">Decline</button></div>`:''}</td>`:''}
  </tr>`).join('')}
  </tbody></table></div></div>`;
}

function vCosts(){
  if(!S.members.length) return `<div class="panel"><div class="empty">
    <b>No members to cost</b>Add staff first.</div></div>`;
  const hpw = Number(S.org.hours_per_week||38);
  const monthly = m => m.pay_basis==='monthly' ? +m.pay_rate
    : m.pay_basis==='annual' ? m.pay_rate/12 : m.pay_rate*hpw*52/12;
  const share = (base,f) => S.contributions.filter(c=>c.is_active!==false)
    .reduce((s,c)=> s + (c.basis==='percent' ? base*Number(c[f])/100 : Number(c[f])), 0);

  let tb=0, te=0, td=0;
  const rows = S.members.map(m=>{
    const b = monthly(m), er = share(b,'employer_value'), ee = share(b,'employee_deduction' in m ? 'employee_value':'employee_value');
    tb+=b; te+=er; td+=ee;
    return `<tr><td><div class="rowflex"><div class="av">${initials(m.full_name)}</div>
      <div><div class="name">${esc(m.full_name)}</div>
      <div class="meta">${esc((m.employment_type||'').replace('_',' '))}</div></div></div></td>
      <td class="mono">${money(b)}</td><td class="mono" style="color:var(--brand)">${money(er)}</td>
      <td class="mono"><b>${money(b+er)}</b></td><td class="mono">${money(ee)}</td>
      <td class="mono">${money(b-ee)}</td></tr>`;
  }).join('');

  return `<div class="grid cards" style="margin-bottom:13px">
    <div class="card"><div class="k">Base salaries</div><div class="v">${money(tb)}</div><div class="vsub">per month</div></div>
    <div class="card"><div class="k">Employer share</div><div class="v" style="color:var(--brand)">${money(te)}</div><div class="vsub">on top of salary</div></div>
    <div class="card"><div class="k">Total cost</div><div class="v">${money(tb+te)}</div><div class="vsub">salary + contributions</div></div>
    <div class="card"><div class="k">Deductions</div><div class="v">${money(td)}</div><div class="vsub">withheld from pay</div></div>
  </div>
  <div class="panel"><div class="phead"><h2>Cost per member</h2>
    <p>Monthly equivalent. Hourly staff estimated at ${hpw} hours per week.</p></div>
  <div class="tscroll"><table><thead><tr><th>Member</th><th>Base</th><th>Employer</th><th>Total</th><th>Deduction</th><th>Net</th></tr></thead>
  <tbody>${rows}</tbody></table></div></div>
  <div class="panel"><div class="phead"><h2>Contributions</h2>
    <p>Seeded from ${esc(S.org.country_code)}. Edit them under Setup.</p></div>
  <div class="tscroll"><table><thead><tr><th>Name</th><th>Basis</th><th>Employer</th><th>Employee</th></tr></thead><tbody>
  ${S.contributions.map(c=>`<tr><td class="name">${esc(c.name)}</td>
    <td>${c.basis==='percent'?'% of salary':'Fixed'}</td>
    <td class="mono">${c.basis==='percent'?Number(c.employer_value)+'%':money(c.employer_value)}</td>
    <td class="mono">${c.basis==='percent'?Number(c.employee_value)+'%':money(c.employee_value)}</td></tr>`).join('')}
  </tbody></table></div></div>`;
}


/* ============================================================
   Worker view — a distinct experience, not a trimmed manager one.
   Clock in, history, leave, payslip.
   ============================================================ */

function wTabs(){
  return [['clock','Clock in'],['history','History'],['wleave','Leave'],['payslip','Payslip']];
}

function vClock(){
  const today = new Date().toISOString().slice(0,10);
  const mine = S.shifts.filter(s=>S.me && s.member_id===S.me.id);
  const todays = mine.find(s=>s.shift_date===today && s.status!=='completed');
  const upcoming = mine.filter(s=>s.shift_date>today && s.status==='scheduled').slice(0,6);
  const brk = S.breakChoice ?? (todays?.break_minutes ?? 0);

  const dateLine = new Date().toLocaleDateString([], {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  let card;
  if(S.openEntry){
    card = `<div class="wcard">
      <div class="wrow"><div class="wtime">${hhmm(S.openEntry.clock_in_at)} &rarr; now</div>
        <span class="pill good">On shift</span></div>
      <div class="wmeta">${esc(todays?.dh_locations?.name || 'Working')}</div>
      <div class="wgrid">
        <div class="wbox"><div class="wlab">Clock in</div><div class="wval">${hhmm(S.openEntry.clock_in_at)}</div></div>
        <div class="wbox"><div class="wlab">Clock out</div><div class="wval">—</div></div>
      </div>
      <div class="wlab" style="margin:14px 0 7px">Break taken</div>
      <div class="brkrow">${[0,30,60,90].map(n=>
        `<button class="brk${brk===n?' on':''}" data-brk="${n}">${n}m</button>`).join('')}</div>
      <button class="wbtn out" id="w_out">Clock out</button>
    </div>`;
  } else if(todays){
    card = `<div class="wcard">
      <div class="wrow"><div class="wtime">${hhmm(todays.starts_at)} – ${hhmm(todays.ends_at)}</div>
        <span class="pill grey">Scheduled</span></div>
      <div class="wmeta">${esc(todays.dh_locations?.name || 'No location')}${
        todays.break_minutes?` · ${todays.break_minutes}m break`:''}</div>
      <div class="wgrid">
        <div class="wbox"><div class="wlab">Clock in</div><div class="wval">—</div></div>
        <div class="wbox"><div class="wlab">Clock out</div><div class="wval">—</div></div>
      </div>
      <div class="wlab" style="margin:14px 0 7px">Break taken</div>
      <div class="brkrow">${[0,30,60,90].map(n=>
        `<button class="brk${brk===n?' on':''}" data-brk="${n}">${n}m</button>`).join('')}</div>
      <button class="wbtn in" data-ci="${todays.id}">Clock in</button>
    </div>`;
  } else {
    card = `<div class="wcard"><div class="empty" style="padding:22px 8px">
      <b>Nothing scheduled today</b>Enjoy the day off.</div></div>`;
  }

  return `<div class="wdate">${esc(dateLine)}</div>
    ${card}
    <p class="hint" style="text-align:center;margin:10px 4px 18px">
      Clock-in checks you are within the location's radius.</p>
    ${upcoming.length ? `<h3 class="wh3">Upcoming shifts</h3>
      ${upcoming.map(s=>`<div class="ucard">
        <div class="udate"><div class="udow">${new Date(s.shift_date).toLocaleDateString([], {weekday:'short'}).toUpperCase()}</div>
          <div class="udd">${new Date(s.shift_date).getDate()}</div>
          <div class="umon">${new Date(s.shift_date).toLocaleDateString([], {month:'short'}).toUpperCase()}</div></div>
        <div><div class="wtime" style="font-size:15px">${hhmm(s.starts_at)} – ${hhmm(s.ends_at)}</div>
          <div class="wmeta">${esc(s.dh_locations?.name||'—')}${s.break_minutes?` · ${s.break_minutes}m break`:''}</div></div>
      </div>`).join('')}` : ''}`;
}

function vHistory(){
  const rows = S.timesheets || [];
  if(!rows.length) return `<h3 class="wh3">Shift history</h3>
    <div class="wcard"><div class="empty" style="padding:24px 8px">
      <b>No completed shifts yet</b>Your record appears here once you clock out.</div></div>`;
  return `<h3 class="wh3">Shift history</h3>
    ${rows.map(r=>{
      const hrs = r.net_minutes!=null ? (r.net_minutes/60).toFixed(2)+'h' : '—';
      const late = r.late_minutes;
      const tag = late==null ? ''
        : late > 5 ? `<span class="pill bad">Late ${late}m</span>`
        : `<span class="pill good">On time</span>`;
      return `<div class="wcard" style="margin-bottom:11px">
        <div class="wrow"><div class="wtime" style="font-size:15.5px">${dmy(r.shift_date || r.clock_in_at)}</div>
          <div class="whrs">${hrs}</div></div>
        <div class="wmeta">${esc(r.location_name||'—')}${r.scheduled_start
          ? ` · scheduled ${hhmm(r.scheduled_start)}–${hhmm(r.scheduled_end)}`:''}${
            r.break_minutes?` · ${r.break_minutes}m break`:''}</div>
        <div class="wrow" style="margin-top:9px;gap:8px">
          <span class="inout">In ${hhmm(r.clock_in_at)} &rarr; Out ${hhmm(r.clock_out_at)}</span>${tag}
        </div></div>`;
    }).join('')}`;
}

function vWLeave(){
  const mine = S.leave.filter(l=>S.me && l.member_id===S.me.id);
  const year = new Date().getFullYear();
  return `<h3 class="wh3">Leave balance (${year})</h3>
    <div class="balgrid">
    ${S.balances.map(b=>`<div class="balcard">
      <div class="ltype">${esc(b.leave_type)}</div>
      ${b.days_allowed > 0
        ? `<div class="lbig">${b.days_remaining}<span class="lsm"> / ${b.days_allowed} left</span></div>
           <div class="lused">${b.days_taken} used</div>`
        : `<div class="lbig" style="font-size:19px;color:var(--brand)">Unpaid</div>
           <div class="lused">${b.days_taken} taken</div>`}
    </div>`).join('')}
    </div>
    <button class="wbtn pri" id="w_req" style="margin:14px 0 18px">+ Request leave</button>
    <h3 class="wh3">My requests</h3>
    ${mine.length ? mine.map(l=>`<div class="wcard" style="margin-bottom:10px">
      <div class="wrow">
        <div><div class="wtime" style="font-size:15px">${esc(l.dh_leave_types?.name||'Leave')}</div>
          <div class="wmeta">${dmy(l.starts_on)}${l.days_count>1?' → '+dmy(l.ends_on):''} · ${l.days_count}d</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        ${l.status==='approved'?'<span class="pill good">Approved</span>'
          :l.status==='declined'?'<span class="pill bad">Declined</span>'
          :l.status==='cancelled'?'<span class="pill grey">Cancelled</span>'
          :'<span class="pill warn">Pending</span>'}
        ${l.status==='pending'?`<button class="linkbtn danger" data-cancelleave="${l.id}">Cancel</button>`:''}
        </div>
      </div></div>`).join('')
      : `<div class="wcard"><div class="empty" style="padding:20px 8px">
         <b>No requests yet</b>Tap the button above to book time off.</div></div>`}`;
}

function vPayslip(){
  return `<h3 class="wh3">Payslips</h3>
    <p class="hint" style="margin:0 0 12px">A payslip becomes available once the month has ended.</p>
    <div class="wcard"><div class="empty" style="padding:26px 8px">
      <b>No payslips yet</b>Your payslip for a month appears here on the 1st of the following month.</div></div>`;
}

function leaveRequestForm(){
  const types = S.leaveTypes.length ? S.leaveTypes
    : S.balances.map(b=>({id:b.leave_type_id, name:b.leave_type}));
  if(!types.length){ toast('No leave types set up yet', true); return; }
  const today = new Date().toISOString().slice(0,10);
  modal('Request leave', `
    ${sel('rq_type','Leave type','',types.map(t=>[t.id,t.name]))}
    <div class="grid2">
      ${fld('rq_from','From', today, 'date')}
      ${fld('rq_to','To', today, 'date')}
    </div>
    <div class="field"><label for="rq_why">Reason (optional)</label>
      <input id="rq_why" type="text" placeholder="Family trip"></div>
    <p class="hint">Your manager will be notified and can approve or decline.</p>`,
    `<div class="spacer"></div>
     <button class="btn" data-close="1">Cancel</button>
     <button class="btn pri" id="rq_go">Send request</button>`);
  $('#rq_go').onclick = async () => {
    const { error } = await db.rpc('dh_request_leave', {
      p_type: V('rq_type'), p_from: V('rq_from'), p_to: V('rq_to'), p_reason: V('rq_why')
    });
    if(error){ toast(error.message, true); return; }
    toast('Leave requested'); closeModal(); refresh();
  };
}

const WVIEWS = { clock:vClock, history:vHistory, wleave:vWLeave, payslip:vPayslip };


function vApprovals(){
  const pending = S.leave.filter(l=>l.status==='pending');
  const recent  = S.leave.filter(l=>l.status!=='pending').slice(0,8);
  const stale   = S.shifts.filter(s=>s.status==='scheduled'
    && s.shift_date < new Date().toISOString().slice(0,10));

  return `
  <div class="grid cards" style="margin-bottom:14px">
    <div class="card"><div class="k">Leave to approve</div>
      <div class="v" style="color:${pending.length?'var(--warn)':'inherit'}">${pending.length}</div>
      <div class="vsub">${pending.length?'waiting on you':'all caught up'}</div></div>
    <div class="card"><div class="k">Unworked shifts</div>
      <div class="v" style="color:${stale.length?'var(--bad)':'inherit'}">${stale.length}</div>
      <div class="vsub">past date, never clocked in</div></div>
    <div class="card"><div class="k">Invites outstanding</div>
      <div class="v">${S.pending?.invites_pending ?? 0}</div>
      <div class="vsub">codes not yet used</div></div>
  </div>

  <div class="panel"><div class="phead"><h2>Leave requests</h2>
    <p>Approving checks the balance first, so you cannot overdraw someone's allowance by mistake.</p></div>
    <div class="pbody" style="padding-top:14px">
    ${pending.length ? pending.map(l=>`
      <div class="appcard"><div class="approw">
        <div style="flex:1;min-width:180px">
          <div class="rowflex"><div class="av">${initials(l.dh_members?.full_name)}</div>
            <div><div class="name">${esc(l.dh_members?.full_name)}</div>
              <div class="meta">${esc(l.dh_leave_types?.name||'Leave')}${
                l.dh_leave_types && !l.dh_leave_types.is_paid?' · unpaid':''}</div></div></div>
          <div class="meta" style="margin-top:8px">
            ${dmy(l.starts_on)}${l.days_count>1?' → '+dmy(l.ends_on):''} · ${l.days_count} day${l.days_count==1?'':'s'}
            ${l.reason?` · "${esc(l.reason)}"`:''}</div>
        </div>
        <div class="rowflex">
          <button class="btn sm good" data-ap="${l.id}">Approve</button>
          <button class="btn sm bad" data-dc="${l.id}">Decline</button>
        </div>
      </div></div>`).join('')
      : `<div class="empty"><b>Nothing waiting</b>New leave requests appear here.</div>`}
    </div>
  </div>

  ${stale.length ? `<div class="panel"><div class="phead"><h2>Shifts never worked</h2>
    <p>Scheduled for a past date with no clock-in. Mark them or delete them.</p></div>
    <div class="tscroll"><table><thead><tr><th>Date</th><th>Member</th><th>Time</th><th></th></tr></thead><tbody>
    ${stale.map(s=>`<tr><td class="mono">${dmy(s.shift_date)}</td>
      <td>${esc(s.dh_members?.full_name||'—')}</td>
      <td class="mono">${hhmm(s.starts_at)}–${hhmm(s.ends_at)}</td>
      <td><button class="linkbtn danger" data-delshift="${s.id}">Delete</button></td></tr>`).join('')}
    </tbody></table></div></div>` : ''}

  ${recent.length ? `<div class="panel"><div class="phead"><h2>Recently decided</h2></div>
    <div class="tscroll"><table><thead><tr><th>Member</th><th>Type</th><th>Dates</th><th>Status</th></tr></thead><tbody>
    ${recent.map(l=>`<tr><td>${esc(l.dh_members?.full_name)}</td>
      <td>${esc(l.dh_leave_types?.name||'')}</td>
      <td class="mono">${dmy(l.starts_on)}${l.days_count>1?' → '+dmy(l.ends_on):''}</td>
      <td>${l.status==='approved'?'<span class="pill good">Approved</span>'
        :l.status==='declined'?'<span class="pill bad">Declined</span>'
        :`<span class="pill grey">${esc(l.status)}</span>`}</td></tr>`).join('')}
    </tbody></table></div></div>` : ''}`;
}

const VIEWS = { approvals:vApprovals, today:vToday, shifts:vShifts, team:vTeam, timesheets:vTimesheets, leave:vLeave, costs:vCosts, setup:vSetup };

function render(){
  if(!isMgr()){
    document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on', b.dataset.t===S.tab));
    const fn = WVIEWS[S.tab] || vClock;
    $('#view').innerHTML = fn();
    return;
  }
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on', b.dataset.t===S.tab));
  const fn = VIEWS[S.tab] || vToday;
  $('#view').innerHTML = fn();
}

/* ---------------- delegated clicks ---------------- */
$('#view').addEventListener('click', e => {
  const add = e.target.closest('[data-add]');
  if(add){
    const k = add.dataset.add;
    if(k==='member')  memberForm(null);
    if(k==='contrib') contribForm(null);
    if(k==='loc')     locForm(null);
    if(k==='ltype')   leaveTypeForm(null);
    if(k==='shift')   shiftForm();
    if(k==='org')     orgForm();
    return;
  }
  const em = e.target.closest('[data-editmem]');
  if(em){ memberForm(S.members.find(m=>m.id===em.dataset.editmem)); return; }
  const iv = e.target.closest('[data-invite]');
  if(iv){ const m=S.members.find(x=>x.id===iv.dataset.invite); inviteFor(m.id,m.full_name); return; }
  const ec = e.target.closest('[data-editcon]');
  if(ec){ contribForm(S.contributions.find(c=>c.id===ec.dataset.editcon)); return; }
  const el = e.target.closest('[data-editloc]');
  if(el){ locForm(S.locations.find(l=>l.id===el.dataset.editloc)); return; }
  const et = e.target.closest('[data-editlt]');
  if(et){ leaveTypeForm(S.leaveTypes.find(t=>t.id===et.dataset.editlt)); return; }
  const ds = e.target.closest('[data-delshift]');
  if(ds){ deleteShift(ds.dataset.delshift); return; }

  const bk = e.target.closest('[data-brk]');
  if(bk){ S.breakChoice = +bk.dataset.brk; render(); return; }
  if(e.target.closest('#w_out')){ clockOut(S.breakChoice ?? 0); return; }
  if(e.target.closest('#w_req')){ leaveRequestForm(); return; }
  const cl = e.target.closest('[data-cancelleave]');
  if(cl){ cancelLeave(cl.dataset.cancelleave); return; }

  const ci = e.target.closest('[data-ci]');
  if(ci){ clockIn(ci.dataset.ci); return; }
  if(e.target.closest('#coBtn')){ clockOut(); return; }
  const ap = e.target.closest('[data-ap]'); if(ap){ decideLeave(ap.dataset.ap, true); return; }
  const dc = e.target.closest('[data-dc]'); if(dc){ decideLeave(dc.dataset.dc, false); return; }
});

/* ---------------- start ---------------- */
boot();
</script>
</body>
</html>
